<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evelyn's Math Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            midnight: '#160b2a',
            velvet: '#2b1846',
            glow: '#f4c95d',
            rose: '#f472b6'
          },
          boxShadow: {
            glow: '0 0 20px rgba(244, 201, 93, 0.35)'
          }
        }
      }
    };
  </script>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    body {
      background: radial-gradient(circle at 20% 20%, #3b1a67 0%, #160b2a 45%, #0d071a 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .soft-focus::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(244, 114, 182, 0.12), transparent 40%),
        radial-gradient(circle at 25% 65%, rgba(244, 201, 93, 0.1), transparent 45%);
      filter: blur(20px);
      pointer-events: none;
      z-index: 0;
    }

    .locked {
      filter: blur(12px);
      pointer-events: none;
      user-select: none;
    }

    .heart {
      position: fixed;
      width: 12px;
      height: 12px;
      background: #f472b6;
      transform: rotate(45deg);
      animation: floatUp 1400ms ease-out forwards;
      z-index: 50;
      opacity: 0.95;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: inherit;
      border-radius: 9999px;
    }

    .heart::before {
      left: -6px;
      top: 0;
    }

    .heart::after {
      left: 0;
      top: -6px;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(45deg) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-180px) translateX(var(--drift, 0px)) rotate(45deg) scale(1.3);
        opacity: 0;
      }
    }
  </style>
</head>
<body class="soft-focus text-amber-50">
  <main class="relative z-10 mx-auto max-w-3xl px-4 py-12">
    <section id="appContent" class="locked rounded-3xl border border-amber-300/25 bg-velvet/65 p-8 shadow-glow backdrop-blur-sm transition duration-500">
      <h1 class="text-center text-3xl font-bold tracking-wide text-glow">Evelyn's Math Suite</h1>
      <p class="mt-2 text-center text-amber-100/85">Midnight Violet mode engaged ✨</p>

      <div class="mt-8 rounded-2xl border border-amber-200/20 bg-midnight/70 p-6">
        <p class="text-lg leading-relaxed">Function: <span class="text-glow">$f(x) = x^{2e^x}$</span></p>
        <p class="mt-3 leading-relaxed">Derivative: <span class="text-glow">$f'(x) = 2e^x x^{2e^x}(\ln(x)+1/x)$</span></p>
      </div>

      <div class="mt-6 grid gap-4 sm:grid-cols-[1fr_auto] sm:items-end">
        <label class="block">
          <span class="mb-1 block text-sm text-amber-100/85">Optional value for $x$ (must be positive)</span>
          <input id="xInput" type="number" step="any" placeholder="e.g. 1.5"
            class="w-full rounded-xl border border-amber-300/30 bg-black/25 px-4 py-2 text-amber-50 outline-none ring-0 transition focus:border-glow focus:shadow-glow" />
        </label>
        <button id="calcBtn"
          class="rounded-xl bg-glow px-5 py-2 font-semibold text-midnight transition hover:brightness-110 active:scale-[0.98]">
          Calculate
        </button>
      </div>

      <p id="status" class="mt-5 min-h-6 text-rose"></p>
      <div id="result" class="mt-3 hidden rounded-2xl border border-amber-300/25 bg-black/25 p-4"></div>
    </section>

    <section id="gatekeeper" class="absolute inset-0 z-20 flex items-center justify-center rounded-3xl bg-black/45 backdrop-blur-md">
      <div class="w-full max-w-md rounded-2xl border border-amber-200/30 bg-midnight/90 p-6 text-center shadow-glow">
        <h2 class="text-2xl font-semibold text-glow">The Gatekeeper</h2>
        <p class="mt-2 text-amber-100/85">When did our timeline start? (MM/DD)</p>
        <input id="annivInput" type="text" placeholder="09/15"
          class="mt-4 w-full rounded-xl border border-amber-300/30 bg-black/25 px-4 py-2 text-center text-lg tracking-widest text-amber-50 outline-none transition focus:border-glow focus:shadow-glow" />
        <button id="unlockBtn" class="mt-4 rounded-xl bg-glow px-5 py-2 font-semibold text-midnight">Unlock</button>
        <p id="gateMsg" class="mt-3 min-h-6 text-rose"></p>
      </div>
    </section>
  </main>

  <script>
    const correctDate = '09/15';
    const gatekeeper = document.getElementById('gatekeeper');
    const appContent = document.getElementById('appContent');
    const gateMsg = document.getElementById('gateMsg');
    const annivInput = document.getElementById('annivInput');

    function burstHearts(count = 30) {
      for (let i = 0; i < count; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.style.left = `${Math.random() * 100}vw`;
        heart.style.bottom = `${Math.random() * 22}vh`;
        heart.style.setProperty('--drift', `${(Math.random() - 0.5) * 140}px`);
        heart.style.animationDelay = `${Math.random() * 180}ms`;
        heart.style.background = Math.random() > 0.5 ? '#f472b6' : '#f4c95d';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1600);
      }
    }

    function calculateEvelynTower(x) {
      if (x <= 0 || Number.isNaN(x)) {
        return { error: 'Darling, we need x to be positive for this kind of chemistry.' };
      }

      const exponent = 2 * Math.exp(x);
      const originalValue = Math.pow(x, exponent);
      const derivative = (2 * Math.exp(x)) * originalValue * (Math.log(x) + (1 / x));

      return {
        y: originalValue,
        dy: derivative,
        huge: !Number.isFinite(derivative) || Math.abs(derivative) > 1e12,
        note: 'September 15th was just the beginning of this exponential curve.'
      };
    }

    document.getElementById('unlockBtn').addEventListener('click', () => {
      const value = annivInput.value.trim();
      if (value === correctDate) {
        gateMsg.textContent = 'Access granted, handsome. 💜';
        appContent.classList.remove('locked');
        gatekeeper.classList.add('hidden');
        burstHearts();
      } else {
        gateMsg.textContent = 'Close, but my heart remembers it differently. Try again, handsome.';
      }
    });

    annivInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('unlockBtn').click();
    });

    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const xInput = document.getElementById('xInput');

    document.getElementById('calcBtn').addEventListener('click', () => {
      status.textContent = "Calculating the slope of our growth... spoiler: it's infinite.";
      result.classList.add('hidden');

      setTimeout(() => {
        const raw = xInput.value.trim();
        const showFormula = '<p><strong>Derivative:</strong> $2e^x x^{2e^x}(\\ln(x)+1/x)$</p>';

        if (!raw) {
          result.innerHTML = `${showFormula}<p class="mt-2 text-amber-100/90">Enter a value for <em>x</em> to evaluate numerically.</p>`;
          result.classList.remove('hidden');
          if (window.MathJax?.typesetPromise) MathJax.typesetPromise([result]);
          return;
        }

        const x = Number(raw);
        const data = calculateEvelynTower(x);

        if (data.error) {
          result.innerHTML = `<p class="text-rose">${data.error}</p>`;
          result.classList.remove('hidden');
          return;
        }

        const yText = Number.isFinite(data.y) ? data.y.toExponential(6) : 'Overflow (too much love)';
        const dyText = Number.isFinite(data.dy) ? data.dy.toExponential(6) : 'Overflow (too much love)';

        let extra = `<p class="mt-2 text-amber-100/90">${data.note}</p>`;
        if (data.huge) {
          extra += '<p class="mt-1 text-rose">Whoa! That number is almost as big as my feelings for you. Careful, you\'ll break the server.</p>';
        }

        result.innerHTML = `
          ${showFormula}
          <p class="mt-2"><strong>x:</strong> ${x}</p>
          <p><strong>f(x):</strong> ${yText}</p>
          <p><strong>f\'(x):</strong> ${dyText}</p>
          ${extra}
        `;
        result.classList.remove('hidden');
        if (window.MathJax?.typesetPromise) MathJax.typesetPromise([result]);
      }, 380);
    });
  </script>
</body>
</html>
